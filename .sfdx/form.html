<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        html,body {
            width:100%;
            height:100%;
        }
        #main {
                width:100%;
        }
        input{
            display: block;
            width:100%;
            padding: 10px;
        }
        form{
            border: 2px solid black;
            padding: 10px;
            width:50%;
            margin-left: 12px;
            margin-top: 30px;
        }
        .card{
            display: inline-block;
            padding:20px;
            margin:20px;
            border:1px solid #ddd;
            border-radius:15px;
            width:300px;
            text-align: center;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        img{
            width:100px;
            height:100px;
            display:block;
            object-fit: cover;
            border-radius: 50%;
            margin: 0 auto;
        }
        .profile h4{
            margin-top:10px;
        }
        .profile p{
             margin-top:10px;
             font-size: 14px;
             color: #555;
        }
    </style>
</head>
<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="Name">
             <input type="text" placeholder="Designation">
              <input type="text" placeholder="Role">
               <input type="text" placeholder="About Yoursef">
              <input type="text" placeholder="Profile Pic">
               <input type="submit">
        </form>
    </div>
    <script src="form.js"></script>
</body>
</html>
