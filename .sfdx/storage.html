<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Toggle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, sans-serif;
    transition: background 0.3s, color 0.3s;
}

/* Light Theme */
.light{
    background:#f5f5f5;
    color:#111;
}

/* Dark Theme */
.dark{
    background:#121212;
    color:#fff;
}

#container{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
    padding:30px 40px;
}

/* Dark container */
body.dark #container{
}

h2{
    font-size:24px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    background:#444;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#222;
}
</style>
</head>

<body>
<div id="container">
    <h2>Theme Preference</h2>
    <button id="toggleBtn">Toggle Theme</button>
</div>

<script src="storage.js"></script>
</body>
</html>
