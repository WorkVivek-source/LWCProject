<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Cards</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">

  <!-- Cards Wrapper -->
  <div class="flex gap-6">

    <!-- Card 1 -->
    <div class="w-80 bg-gray-900 border border-gray-800 rounded-2xl p-5">
      <div class="flex items-center gap-4">
        <div class="relative">
          <img
            src="https://i.pravatar.cc/100?img=1"
            alt="Profile"
            class="w-16 h-16 rounded-full object-cover"
          >
          <span class="absolute bottom-0 right-0 w-4 h-4 bg-green-500 border-2 border-gray-900 rounded-full"></span>
        </div>

        <div>
          <h2 class="text-white font-semibold text-lg">John Doe</h2>
          <p class="text-green-400 text-sm">Active</p>
        </div>
      </div>

      <p class="text-gray-400 text-sm mt-4">
        Full Stack Developer passionate about modern web apps.
      </p>
    </div>
