<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web To Lead</title> 
   <link rel="stylesheet" href="webtolead.css">
</head>
<body>
    <div class="main">
         <h1>Create Lea</h1>
         <div class="container"> 
           <form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00D5h0000093vMe" method="POST" onsubmit="beforeSubmit(event)">
                <input type=hidden name="oid" value="00D5h0000093vMe">
                <input type="hidden" name=retURL" value="https://www.entrepreneur.com/wp-content/uploads/sites/2/2016/11/20141106185423-5-powerful-ways-give-thanks-your-people.jpeg" 
                <input type="hidden" class="Lead_Date__c" name="Lead_Date__c">
               
                <label for="first_name">First Name</label><input  id="first_name" maxlength="40" name="first_name" size="20" type="text" required/>

                <label for="last_name">Last Name</label><input  id="last_name" maxlength="80" name="last_name" size="20" type="text" required/>

                <label for="email">Email</label><input  id="email" maxlength="80" name="email" size="20" type="email" required/>

                <label for="company">Company</label><input  id="company" maxlength="40" name="company" size="20" type="text" required/>

                <label for="date">Lead Date</label>
                <input  id="date"  name="date" type="date" required/>

                <input type="submit" class="submit">
           </form>
         </div>
    </div>
   <script src="webtolead.js"></script>
</body>
</html>
