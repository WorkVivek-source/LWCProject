<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        body,html{
            width: 100%;
            height:100%;
            padding:10px;
        }
        #main{
            width:100%;
            background-color: white;
        }
        #nav{
               width: 100%;
               height:8%;
                display:flex;
                align-items: center;
                justify-content: space-around;
               background-color: #444;
               margin-top:10px;
        }
        a{
            display: block;
            margin-left: 10px;
            color: white;
        }
        button{
            padding: 12px 22px;
            border-radius: 30px;
            background-color: bisque;
            outline: none;
            border: none;
        }
        ul{
            margin-top:10px;
        }
        .lt{
            text-decoration: line-through;
        }
        input{
            margin-top:10px;
        }
        h1{
            margin-top:5px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="nav">
            <a href="">Home</a>
            <a href="">About</a>
            <button>Click & Follow</button>
        </div>
    </div>
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Litchi</li>
        <li>Guava</li>
        <li>Banana</li>
    </ul>
    <input type="text" placeholder="Write Anything">
    <h1>Characters Left : <span>20</span></h1>
    <script src="bubble.js"></script>
</body>
</html>
